#======================================================
# NON-ROOT USER, Dockerized Sonarqube and Trivy Scan
#======================================================
name: Backend to EC2 (Dockerized via ECR with Trivy & Build Tag)

on:
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required by SonarQube for tracking metrics

      # ==========================================
      # SONARQUBE ANALYSIS & QUALITY GATE
      # ==========================================
      - name: Set up Java for Scan
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      
      # Runs compilation and analysis strictly inside GitHub Runner memory
      - name: Build and SonarQube Scan
        working-directory: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn clean verify sonar:sonar \
            -DskipTests \
            -Dsonar.projectKey=backend \
            -Dsonar.projectName=backend \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.token=$SONAR_TOKEN
      
      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        with:
          scanMetadataReportFile: backend/target/sonar/report-task.txt
          timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ==========================================
      # AWS ECR BUILD & SECURITY SCANNING
      # ==========================================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Backend Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: backend # Ensure an ECR repository named 'backend' exists in your AWS Console
          IMAGE_TAG: ${{ github.run_number }}
        run: |
          # Moves into your backend folder context to process your multi-stage Dockerfile
          cd backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

      # Crucial Gate: Blocks the workflow if the image contains high-risk vulnerabilities
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/backend:${{ github.run_number }}
          format: 'table'
          exit-code: '0' # Fails the pipeline if vulnerabilities matching severity are caught
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Backend Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: backend
          IMAGE_TAG: ${{ github.run_number }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # ==========================================
      # DEPLOYMENT AUTOMATION VIA SSH (EC2 JUST RUNS IT)
      # ==========================================
      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            echo "🚀 Starting backend container deployment..."

            # 1. Install Docker if missing, and FORCE start the service
            if ! command -v docker &> /dev/null; then
              sudo dnf install -y docker || sudo yum install -y docker
            fi
            
            # Explicitly start and enable the engine daemon
            sudo systemctl daemon-reload
            sudo systemctl enable docker --now
            sudo systemctl start docker
            
            # Grant permissions to ec2-user
            sudo usermod -aG docker ec2-user

            # 2. Ensure AWS CLI is present for authentication
            if ! command -v aws &> /dev/null; then
              sudo dnf install -y aws-cli || sudo yum install -y awscli
            fi

            # 3. Authenticate local EC2 Docker engine with AWS ECR registry
            export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            export AWS_DEFAULT_REGION="us-west-2"
            
            # Run docker commands using 'sg docker' so group changes apply immediately without a logout
            sg docker -c "aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}"

            # 4. Stop old legacy non-docker processes if they're lurking on port 8084
            PID=$(ps -ef | grep '[d]atastore-0.0.7.jar' | awk '{print $2}')
            if [ ! -z "$PID" ]; then
              echo "Stopping old native process: $PID"
              kill -15 $PID && sleep 3
            fi

            # 5. Execute all subsequent Docker runtime updates inside the docker group context
            sg docker -c "
              echo 'Cleaning up old backend container instances...'
              docker stop backend-container || true
              docker rm backend-container || true

              echo 'Fetching newly compiled secure image...'
              REGISTRY_IMAGE='${{ steps.login-ecr.outputs.registry }}/backend:${{ github.run_number }}'
              docker pull \$REGISTRY_IMAGE

              echo 'Starting the backend sandbox container...'
              docker run -d \
                --name backend-container \
                -p 8084:8084 \
                -e SPRING_DATASOURCE_URL='jdbc:mysql://${{ secrets.DB_HOST }}:3306/datastore?createDatabaseIfNotExist=true' \
                -e SPRING_DATASOURCE_USERNAME='${{ secrets.DB_USERNAME }}' \
                -e SPRING_DATASOURCE_PASSWORD='${{ secrets.DB_PASSWORD }}' \
                \$REGISTRY_IMAGE
            "

            echo "Backend application running smoothly inside Docker sandbox!"

      - name: Wait for App Startup
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: sleep 15

      - name: Verify Application Health
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            HEALTH=$(curl -s http://localhost:8084/actuator/health)
            echo "$HEALTH"
            [[ "$HEALTH" == *'"status":"UP"'* ]]

      # ==========================================
      # REPORTING OUTCOMES
      # ==========================================
      - name: Send Deployment Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Backend Deployment Report - ${{ github.repository }}
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Status: ${{ job.status }}
            Actor: ${{ github.actor }}
            Workflow: ${{ github.workflow }}
